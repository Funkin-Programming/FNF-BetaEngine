name: Main Build

on:
  workflow_dispatch:

jobs:
  android:
    name: Build Android
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e
          add-to-path: false

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: 4.3.7

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib install hxp --quiet
          haxelib run hmm setup
          haxelib run hmm install
          haxelib run lime rebuild hxcpp --quiet

      - name: Configure Android
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.setup-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME
          haxelib run lime config ANDROID_SETUP true

      - name: Compile
        run: haxelib run lime build android -release

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign-apk
        with:
          releaseDirectory: export/release/android/bin/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Verify APK with Google Play
        uses: google-github-actions/upload-google-play@v2
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: me.funkin.betaengine
          releaseFiles: ${{ steps.sign-apk.outputs.signedReleaseFile }}
          track: internal
          status: draft

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetaEngine-Android
          path: ${{ steps.sign-apk.outputs.signedReleaseFile }}
          if-no-files-found: error

  ios:
    name: Build iOS
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: 4.3.7

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib install hxp --quiet
          haxelib run hmm setup --quiet
          haxelib run hmm install --quiet
          haxelib run lime rebuild hxcpp

      - name: Compile
        run: haxelib run lime build ios -nosign

      - name: Package IPA
        run: |
          brew install ldid
          APP_NAME="BetaEngine"
          APP_DIR="export/release/ios/build/Release-iphoneos/${APP_NAME}.app"
          ENTITLEMENTS="export/release/ios/build/${APP_NAME}/${APP_NAME}.entitlements"
          ldid -S"${ENTITLEMENTS}" "${APP_DIR}/${APP_NAME}"
          cd "export/release/ios/build/Release-iphoneos"
          mkdir Payload
          mv "${APP_NAME}.app" Payload
          zip -r "${APP_NAME}.ipa" Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetaEngine-iOS
          path: export/release/ios/build/Release-iphoneos/*.ipa
          if-no-files-found: error

  windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: 4.3.7

      - name: Install Libraries
        run: |
          haxelib setup D:/haxelib
          haxelib install hmm --quiet
          haxelib install hxp --quiet
          haxelib run hmm setup
          haxelib run hmm install
          haxelib run lime rebuild hxcpp --quiet

      - name: Compile
        run: haxelib run lime build windows -release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetaEngine-Windows
          path: export/release/windows/bin/
          if-no-files-found: error

  linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: 4.3.7

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvlc-dev \
            libvlccore-dev \
            libasound2-dev \
            libx11-dev \
            libxext-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib install hxp --quiet
          haxelib run hmm setup
          haxelib run hmm install
          haxelib run lime rebuild hxcpp --quiet

      - name: Compile
        run: haxelib run lime build linux -release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetaEngine-Linux
          path: export/release/linux/bin/
          if-no-files-found: error

  macos:
    name: Build MacOS
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: 4.3.7

      - name: Install Libraries
        run: |
          haxelib install hmm --quiet
          haxelib install hxp --quiet
          haxelib run hmm setup
          haxelib run hmm install
          haxelib run lime rebuild hxcpp --quiet

      - name: Compile
        run: haxelib run lime build mac -release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetaEngine-MacOS
          path: export/release/macos/bin/
          if-no-files-found: error
